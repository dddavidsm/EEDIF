<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspecApp — Inspecció d'Edificis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#090A0C;--s1:#111318;--s2:#181B22;--s3:#1E2129;--bd:#272C38;--bd2:#343B4A;--acc:#F5A623;--accd:rgba(245,166,35,.12);--tx:#DDE1EC;--t2:#7B84A0;--t3:#3F4459;--ok:#22C55E;--err:#EF4444;--r:6px;--r2:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.mono{font-family:'IBM Plex Mono',monospace}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-acc{background:var(--acc);color:#000}.btn-acc:hover{background:#FBBF24}.btn-acc:disabled{opacity:.4;cursor:default}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd)}.btn-g:hover{background:var(--s2);color:var(--tx);border-color:var(--bd2)}
.btn-d{background:rgba(239,68,68,.1);color:var(--err);border:1px solid rgba(239,68,68,.2)}.btn-d:hover{background:rgba(239,68,68,.18)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:7px;aspect-ratio:1}
input,textarea,select{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-family:inherit;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:72px}
label{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;display:block}
.ff{display:flex;flex-direction:column;gap:4px}
.fr{display:flex;gap:12px}.fr .ff{flex:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:24px;width:min(560px,95vw);max-height:90vh;overflow-y:auto}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mft{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)}
.sep{height:1px;background:var(--bd);margin:14px 0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.code-b{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:4px 9px;border-radius:4px;background:var(--s3);border:1px solid var(--bd2)}
.tool-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;border-radius:var(--r);background:transparent;border:1px solid var(--bd);cursor:pointer;font-size:10px;color:var(--t2);font-weight:700;letter-spacing:.04em;transition:all .15s;min-width:52px}
.tool-btn:hover{background:var(--s3);border-color:var(--bd2);color:var(--tx)}
.tool-btn.on{background:var(--accd);border-color:var(--acc);color:var(--acc)}
.zone-tabs{display:flex;gap:2px;overflow-x:auto;padding:8px 12px 0;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;scrollbar-width:none}
.zone-tabs::-webkit-scrollbar{display:none}
.ztab{padding:8px 14px 9px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);border-bottom:none;background:var(--s2);color:var(--t2);white-space:nowrap;transition:all .15s;position:relative;top:1px;user-select:none}
.ztab:hover{background:var(--s3);color:var(--tx)}
.ztab.on{background:var(--bg);color:var(--tx);border-color:var(--bd);border-bottom-color:var(--bg)}
.ztab-add{padding:8px 11px;border-radius:6px 6px 0 0;font-size:16px;cursor:pointer;border:1px dashed var(--bd);border-bottom:none;background:transparent;color:var(--t3);position:relative;top:1px;transition:all .15s;line-height:1}
.ztab-add:hover{color:var(--acc);border-color:var(--acc);background:var(--accd)}
.li{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .15s}
.li:hover{background:var(--s2);border-color:var(--bd)}
.li.sel{background:var(--accd);border-color:rgba(245,166,35,.3)}
.proj-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.proj-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc);opacity:0;transition:opacity .2s}
.proj-card:hover::before{opacity:1}
.stat-box{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--acc)}
.stat-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:2px}
.exp-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.exp-opt:hover{border-color:var(--acc);background:var(--accd)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fi .18s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useCallback}=React;

/* ── Constants ─────────────────────────────────────────────────── */
const LT=[
  {code:'E', name:'Esquerdes',       color:'#EF4444',hasO:true },
  {code:'F', name:'Fissures',        color:'#F97316',hasO:true },
  {code:'MF',name:'Micro-Fissures',  color:'#EAB308',hasO:true },
  {code:'ES',name:'Escrostaments',   color:'#A855F7',hasO:true },
  {code:'Q', name:'Quartejat',       color:'#EC4899',hasO:false},
  {code:'DA',name:'Desadherències',  color:'#3B82F6',hasO:false},
  {code:'DG',name:'Degradacions',    color:'#71717A',hasO:false},
  {code:'O', name:'Oxidacions',      color:'#D97706',hasO:false},
  {code:'H', name:'Humitats',        color:'#06B6D4',hasO:false},
  {code:'AD',name:'Armadures vistes',color:'#DC2626',hasO:false},
];
const SIT=[{code:'P',name:'Paret'},{code:'T',name:'Terra'},{code:'S',name:'Sostre'}];
const ORI=[{code:'H',name:'Horitzontal'},{code:'V',name:'Vertical'},{code:'I',name:'Inclinada'}];
const URG=[{code:'U',name:'Urgent',c:'#EF4444'},{code:'L',name:'Lleu',c:'#F59E0B'},{code:'I',name:'Informatiu',c:'#3B82F6'}];
const ZTYPES=[
  {code:'FA',name:'Façana Anterior',em:'🏛'},{code:'FP',name:'Façana Posterior',em:'🏛'},
  {code:'ZC',name:'Zones Comuns',em:'🚪'},{code:'CO',name:'Coberta',em:'🏠'},
  {code:'HA',name:'Habitatge',em:'🛏'},{code:'LO',name:'Local',em:'🏪'},
];

let _uid=1000;
const uid=()=>`_${++_uid}`;
const lt=(c)=>LT.find(t=>t.code===c)||LT[0];
const urg=(c)=>URG.find(u=>u.code===c)||URG[1];

const autoCode=(tipus,sit,ori,lesions)=>{
  const t=lt(tipus);
  const base=t.hasO?`${tipus}${ori}${sit}`:`${tipus}${sit}`;
  const n=lesions.filter(l=>l.code.startsWith(base)&&l.code.slice(base.length).match(/^\d+$/)).length+1;
  return `${base}${n}`;
};

    {id:'z2',name:'Façana Posterior',type:'FP',planta:'Façana',pis:'-',

       {id:'e20',x:80,y:50,w:440,h:300,lbl:''},
       {id:'e21',x:210,y:316,w:88,h:32,lbl:'Porta posterior'},

    {id:'z5',name:'Coberta',type:'CO',planta:'Coberta',pis:'-',

       {id:'e50',x:60,y:40,w:490,h:290,lbl:'Coberta plana'},

};

/* ── Tiny UI ───────────────────────────────────────────────────── */
const X=({onClick})=>(
  <button onClick={onClick} className="btn btn-g btn-icon btn-sm" style={{fontSize:12}}>✕</button>
);
const TypeChip=({code})=>{const t=lt(code);return(
  <span className="chip" style={{background:t.color+'22',color:t.color,border:`1px solid ${t.color}44`}}>{code}</span>
);};
const UrgBadge=({code})=>{const u=urg(code);return(
  <span className="tag" style={{background:u.c+'22',color:u.c}}>{u.name}</span>
);};
const Tog=({opts,val,onSet,color})=>(
  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
    {opts.map(o=>(
      <button key={o.code} onClick={()=>onSet(o.code)}
        style={{padding:'6px 12px',borderRadius:'var(--r)',border:`1px solid ${val===o.code?(color||'var(--acc)')+'88':'var(--bd)'}`,
          background:val===o.code?(color||'var(--acc)')+'22':'var(--s2)',
          color:val===o.code?color||'var(--acc)':'var(--t2)',
          cursor:'pointer',fontSize:12,fontWeight:600,transition:'all .15s'}}>
        {o.name}
      </button>
    ))}
  </div>
);

/* ── Lesion Ficha Modal ─────────────────────────────────────────── */
const Ficha=({lesion,allLesions,onSave,onDelete,onClose})=>{
  const isNew=!lesion.id;
  const [f,sf]=useState({tipus:lesion.tipus||'F',sit:lesion.sit||'P',ori:lesion.ori||'H',urg:lesion.urg||'L',obs:lesion.obs||'',fotos:lesion.fotos||0});
  const set=(k,v)=>sf(p=>({...p,[k]:v}));
  const t=lt(f.tipus);
  const code=isNew?autoCode(f.tipus,f.sit,f.ori,allLesions):lesion.code;
  const urgColor=urg(f.urg).c;

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fi" style={{maxWidth:520}}>
        <div className="mhd">
          <div>
            <h2 style={{marginBottom:6}}>{isNew?'Afegir nova lesió':'Editar lesió'}</h2>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontFamily:'IBM Plex Mono',fontSize:17,fontWeight:700,color:t.color,padding:'3px 10px',background:t.color+'18',borderRadius:5,border:`1px solid ${t.color}44`}}>{code}</span>
              <span style={{fontSize:11,color:'var(--t2)'}}>codi autogenerat</span>
            </div>
          </div>
          <X onClick={onClose}/>
        </div>

        <div className="ff" style={{marginBottom:14}}>
          <label>Tipus de lesió</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {LT.map(tp=>(
              <button key={tp.code} onClick={()=>set('tipus',tp.code)}
                style={{padding:'8px 4px',borderRadius:'var(--r)',border:`1.5px solid ${f.tipus===tp.code?tp.color:'var(--bd)'}`,
                  background:f.tipus===tp.code?tp.color+'1A':'var(--s2)',color:f.tipus===tp.code?tp.color:'var(--t2)',
                  cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all .15s'}}>
                <span style={{fontFamily:'IBM Plex Mono',fontSize:11,fontWeight:700}}>{tp.code}</span>
                <span style={{fontSize:9,fontWeight:500}}>{tp.name.split('/')[0].split(' ')[0]}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div className="ff">
            <label>Situació</label>
            <Tog opts={SIT} val={f.sit} onSet={v=>set('sit',v)} color={t.color}/>
          </div>
          {t.hasO&&<div className="ff">
            <label>Orientació</label>
            <Tog opts={ORI} val={f.ori} onSet={v=>set('ori',v)} color={t.color}/>
          </div>}
        </div>

        <div className="ff" style={{marginBottom:14}}>
          <label>Urgència</label>
          <Tog opts={URG.map(u=>({code:u.code,name:u.name}))} val={f.urg} onSet={v=>set('urg',v)} color={urgColor}/>
        </div>

        <div className="ff" style={{marginBottom:14}}>
          <label>Observacions</label>
          <textarea value={f.obs} onChange={e=>set('obs',e.target.value)} placeholder="Descripció detallada de la lesió, dimensions estimades, possible causa..."/>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'var(--s2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:16}}>
          <span style={{fontSize:22}}>📷</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13}}>{f.fotos} foto{f.fotos!==1?'s':''} adjunta{f.fotos!==1?'des':''}</div>
            <div style={{fontSize:11,color:'var(--t2)'}}>Adjunta fotos de la lesió per identificació i datació</div>
          </div>
          <button className="btn btn-g btn-sm" onClick={()=>set('fotos',f.fotos+1)}>+ Foto</button>
          {f.fotos>0&&<button className="btn btn-g btn-sm" onClick={()=>set('fotos',Math.max(0,f.fotos-1))}>-</button>}
        </div>

        <details style={{marginBottom:12}}>
          <summary style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t3)',cursor:'pointer'}}>Simbologia de referència</summary>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
            {LT.map(tp=>(
              <div key={tp.code} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--t2)'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:tp.color}}/>
                <span style={{fontFamily:'IBM Plex Mono',fontWeight:600,color:tp.color}}>{tp.code}</span>
                <span>{tp.name}</span>
              </div>
            ))}
          </div>
        </details>

        <div className="mft" style={{justifyContent:'space-between'}}>
          <div>{!isNew&&<button className="btn btn-d btn-sm" onClick={onDelete}>Eliminar</button>}</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-g" onClick={onClose}>Cancel·lar</button>
            <button className="btn btn-acc" onClick={()=>onSave({...f,code,id:lesion.id||uid(),x:lesion.x,y:lesion.y})}>
              {isNew?'Afegir lesió':'Guardar canvis'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Croquis Canvas ─────────────────────────────────────────────── */
const Canvas=({elements,lesions,selected,tool,onClickLesion,onAddLesion,onAddRect})=>{
  const ref=useRef(null);
  const [draw,setDraw]=useState(null);
  const [qpos,setQpos]=useState(null);

  const toSVG=(e)=>{
    const s=ref.current,r=s.getBoundingClientRect();
    return{x:(e.clientX-r.left)/r.width*620,y:(e.clientY-r.top)/r.height*420};
  };

  const onMD=(e)=>{if(tool==='rect'){const p=toSVG(e);setDraw({x:p.x,y:p.y,w:0,h:0});}};
  const onMM=(e)=>{if(draw&&tool==='rect'){const p=toSVG(e);setDraw(d=>({...d,w:p.x-d.x,h:p.y-d.y}));}};
  const onMU=()=>{
    if(draw&&tool==='rect'&&Math.abs(draw.w)>12&&Math.abs(draw.h)>12){
      const r={x:draw.w<0?draw.x+draw.w:draw.x,y:draw.h<0?draw.y+draw.h:draw.y,w:Math.abs(draw.w),h:Math.abs(draw.h)};
      const lbl=window.prompt('Etiqueta (ex: H1, C, L1, Sala...):')||'';
      onAddRect({id:uid(),...r,lbl});
    }
    setDraw(null);
  };
  const onCLick=(e)=>{
    if(tool!=='lesion'||qpos)return;
    const p=toSVG(e);setQpos(p);
  };

  return(
    <svg ref={ref} viewBox="0 0 620 420" style={{width:'100%',height:'100%',cursor:tool==='lesion'?'crosshair':tool==='rect'?'crosshair':'default',display:'block'}}
      onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onClick={onCLick}>
      <defs>
        <pattern id="sg" width="10" height="10" patternUnits="userSpaceOnUse">
          <path d="M10 0L0 0 0 10" fill="none" stroke="rgba(255,255,255,0.035)" strokeWidth="0.5"/>
        </pattern>
        <pattern id="bg" width="50" height="50" patternUnits="userSpaceOnUse">
          <rect width="50" height="50" fill="url(#sg)"/>
          <path d="M50 0L0 0 0 50" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
        </pattern>
      </defs>
      <rect width="620" height="420" fill="url(#bg)"/>

      {/* Rooms */}
      {elements.map(el=>(
        <g key={el.id}>
          <rect x={el.x} y={el.y} width={el.w} height={el.h} fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.22)" strokeWidth="1.5" rx="2"/>
          {el.lbl&&<text x={el.x+5} y={el.y+13} fill="rgba(255,255,255,0.38)" fontSize="9" fontFamily="IBM Plex Mono" fontWeight="600">{el.lbl}</text>}
        </g>
      ))}

      {/* Drawing preview */}
      {draw&&<rect
        x={draw.w<0?draw.x+draw.w:draw.x} y={draw.h<0?draw.y+draw.h:draw.y}
        width={Math.abs(draw.w)} height={Math.abs(draw.h)}
        fill="rgba(245,166,35,0.08)" stroke="#F5A623" strokeWidth="1.5" strokeDasharray="5,3" rx="2"/>}

      {/* Lesion pins */}
      {lesions.map(l=>{
        const t=lt(l.tipus),sel=selected===l.id;
        return(
          <g key={l.id} onClick={e=>{e.stopPropagation();onClickLesion(l.id)}} style={{cursor:'pointer'}}>
            {sel&&<circle cx={l.x} cy={l.y} r={20} fill={t.color+'18'} stroke={t.color+'44'} strokeWidth="1"/>}
            <circle cx={l.x} cy={l.y} r={sel?13:11}
              fill={t.color+(sel?'30':'22')} stroke={t.color} strokeWidth={sel?2.5:1.8}
              style={{filter:sel?`drop-shadow(0 0 5px ${t.color}88)`:undefined}}/>
            <text x={l.x} y={l.y+.5} textAnchor="middle" dominantBaseline="middle"
              fill={t.color} fontSize={l.code.length>4?7:8} fontFamily="IBM Plex Mono" fontWeight="700">{l.code}</text>
            {sel&&l.obs&&<text x={l.x} y={l.y+22} textAnchor="middle" fill="rgba(255,255,255,.5)" fontSize="7.5" fontFamily="DM Sans">{l.obs.slice(0,35)}{l.obs.length>35?'…':''}</text>}
          </g>
        );
      })}

      {/* Quick type picker */}
      {qpos&&(
        <foreignObject x={Math.min(qpos.x+5,430)} y={Math.min(qpos.y+5,280)} width="188" height="230">
          <div style={{background:'#13151A',border:'1px solid #343B4A',borderRadius:8,padding:10,boxShadow:'0 12px 40px rgba(0,0,0,.7)'}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#7B84A0',marginBottom:7}}>Tipus de lesió</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
              {LT.map(tp=>(
                <button key={tp.code} onClick={e=>{e.stopPropagation();onAddLesion({x:qpos.x,y:qpos.y,tipus:tp.code});setQpos(null);}}
                  style={{padding:'5px 6px',background:tp.color+'1A',border:`1px solid ${tp.color}44`,borderRadius:4,
                    color:tp.color,cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:'IBM Plex Mono',textAlign:'left'}}>
                  {tp.code}
                </button>
              ))}
            </div>
            <button onClick={e=>{e.stopPropagation();setQpos(null);}}
              style={{marginTop:7,width:'100%',padding:'4px',background:'transparent',border:'none',color:'#3F4459',cursor:'pointer',fontSize:11,fontFamily:'DM Sans'}}>
              Cancel·lar
            </button>
          </div>
        </foreignObject>
      )}

      {lesions.length===0&&elements.length===0&&(
        <text x="310" y="210" textAnchor="middle" fill="rgba(255,255,255,0.12)" fontSize="12" fontFamily="DM Sans">
          Utilitza les eines per dibuixar el croquis i afegir lesions
        </text>
      )}
    </svg>
  );
};

/* ── Zone View ─────────────────────────────────────────────────── */

  const addLesion=({x,y,tipus})=>setFicha({lesion:{x,y,tipus,sit:'P',ori:'H',urg:'L',obs:'',fotos:0},mode:'new'});

    const ex=zone.lesions.find(l=>l.id===data.id);

            <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--t3)'}}>Llegenda:</span>

              <div key={t.code} style={{display:'flex',alignItems:'center',gap:3,fontSize:10}}>

                    <span style={{color:'var(--acc)',cursor:'pointer'}} onClick={()=>setTool('lesion')}>Utilitza 📍 per afegir-ne.</span>

                  <div key={l.id} className={`li${sel===l.id?' sel':''}`} onClick={()=>setSel(l.id)}>

                    <div style={{flex:1,minWidth:0}}>

                  </div>

            </div>

    </div>
  );
};

    const rows=project.zones.flatMap(z=>z.lesions.map(l=>[
      l.code,l.tipus,lt(l.tipus).name,z.name,z.planta,z.pis,
      SIT.find(s=>s.code===l.sit)?.name,ORI.find(o=>o.code===l.ori)?.name||'—',
      URG.find(u=>u.code===l.urg)?.name,l.fotos,l.obs
    ]));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...rows]),'Lesions');
    project.zones.forEach(z=>{
      const zHdr=[...hdr];
      const zRows=z.lesions.map(l=>[l.code,l.tipus,lt(l.tipus).name,z.name,z.planta,z.pis,SIT.find(s=>s.code===l.sit)?.name,ORI.find(o=>o.code===l.ori)?.name||'—',URG.find(u=>u.code===l.urg)?.name,l.fotos,l.obs]);
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([zHdr,...zRows]),z.name.slice(0,28));
    });
    XLSX.writeFile(wb,`${project.name.replace(/[^a-zA-Z0-9]/g,'_')}_${project.codiObra}.xlsx`);
    setBusy(null);
  };

  const doJSON=()=>{
    setBusy('json');
    const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`inspecapp_${project.codiObra}.json`;a.click();
    setTimeout(()=>setBusy(null),800);
  };

  const doCSV=()=>{
    setBusy('csv');
    const rows=[['Zona','Planta','Pis','Codi','Tipus','Situació','Orientació','Urgència','Fotos','Observacions']];
    project.zones.forEach(z=>z.lesions.forEach(l=>rows.push([z.name,z.planta,z.pis,l.code,lt(l.tipus).name,l.sit,l.ori||'',urg(l.urg).name,l.fotos,l.obs])));
    const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`${project.codiObra}_lesions.csv`;a.click();
    setTimeout(()=>setBusy(null),800);
  };

  const all=project.zones.flatMap(z=>z.lesions);
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fi" style={{maxWidth:460}}>
        <div className="mhd"><h2>Exportar informe</h2><X onClick={onClose}/></div>
        <div style={{padding:'10px 14px',background:'var(--s2)',borderRadius:'var(--r)',border:'1px solid var(--bd)',marginBottom:16,fontSize:13}}>
          <strong>{project.name}</strong> · <span style={{color:'var(--t2)'}}>{all.length} lesions · {project.zones.length} zones · {all.reduce((s,l)=>s+(l.fotos||0),0)} fotos</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {[
            {fn:doXLSX,k:'xlsx',icon:'📊',label:'Excel (.xlsx)',desc:'Totes les fitxes per zona. Una fila per lesió. Un full per zona.'},
            {fn:doCSV,k:'csv',icon:'📋',label:'CSV estàndard',desc:'Format simple per importar a qualsevol aplicació.'},
            {fn:doJSON,k:'json',icon:'📦',label:'Backup JSON',desc:'Totes les dades del projecte en format reutilitzable.'},
          ].map(o=>(
            <div key={o.k} className="exp-opt" onClick={o.fn} style={{opacity:busy&&busy!==o.k?.45:1}}>
              <span style={{fontSize:26}}>{busy===o.k?'⏳':o.icon}</span>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{busy===o.k?'Generant…':o.label}</div>
                <div style={{fontSize:11,color:'var(--t2)'}}>{o.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:14,padding:'10px 14px',background:'var(--accd)',borderRadius:'var(--r)',border:'1px solid rgba(245,166,35,.25)',fontSize:11,color:'var(--t2)'}}>
          💡 L'exportació PDF completa (amb croquis i fotos) requereix la versió completa de producció.
        </div>
        <div className="mft"><button className="btn btn-g" onClick={onClose}>Tancar</button></div>
      </div>
    </div>
  );
};

/* ── New Project Modal ──────────────────────────────────────────── */
const NewProjM=({onSave,onClose})=>{
  const [f,sf]=useState({name:'',codiObra:'',edifici:'',inspector:'',data:new Date().toLocaleDateString('ca'),desc:''});
  const set=(k,v)=>sf(p=>({...p,[k]:v}));
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fi">
        <div className="mhd"><h2>Nou projecte d'inspecció</h2><X onClick={onClose}/></div>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <div className="fr">
            <div className="ff" style={{flex:2}}><label>Nom del projecte *</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="ex: Ramon Turró 157" autoFocus/></div>
            <div className="ff"><label>Codi d'obra</label><input value={f.codiObra} onChange={e=>set('codiObra',e.target.value)} placeholder="ex: 15350"/></div>
          </div>
          <div className="ff"><label>Adreça de l'edifici *</label><input value={f.edifici} onChange={e=>set('edifici',e.target.value)} placeholder="ex: C/ Ramon Turró, 157, Barcelona"/></div>
          <div className="fr">
            <div className="ff"><label>Inspector</label><input value={f.inspector} onChange={e=>set('inspector',e.target.value)} placeholder="Nom de l'inspector"/></div>
            <div className="ff"><label>Data d'inspecció</label><input value={f.data} onChange={e=>set('data',e.target.value)}/></div>
          </div>
          <div className="ff"><label>Descripció de l'edifici</label><textarea value={f.desc} onChange={e=>set('desc',e.target.value)} placeholder="Tipologia, nº plantes, estructura, acabats..."/></div>
        </div>
        <div className="mft">
          <button className="btn btn-g" onClick={onClose}>Cancel·lar</button>
          <button className="btn btn-acc" disabled={!f.name||!f.edifici} onClick={()=>onSave({id:uid(),zones:[],...f})}>Crear projecte</button>
        </div>
      </div>
    </div>
  );
};

/* ── Project View ───────────────────────────────────────────────── */
const ProjView=({project,onUpdate,onBack})=>{
  const [az,setAz]=useState(project.zones[0]?.id||null);
  const [showNZ,setShowNZ]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [view,setView]=useState('croquis');

  const zone=project.zones.find(z=>z.id===az);
  const upZone=(z)=>onUpdate({...project,zones:project.zones.map(p=>p.id===z.id?z:p)});
  const addZone=(z)=>{onUpdate({...project,zones:[...project.zones,z]});setAz(z.id);setShowNZ(false);};
  const urgent=project.zones.flatMap(z=>z.lesions).filter(l=>l.urg==='U').length;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',background:'var(--s1)',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <button className="btn btn-g btn-sm" onClick={onBack}>← Inici</button>
        <div style={{width:1,height:20,background:'var(--bd)'}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'Syne',fontSize:15,fontWeight:800,lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{project.name}</div>
          <div style={{fontSize:11,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{project.edifici} · <span className="mono">{project.codiObra}</span></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          {urgent>0&&<span className="tag" style={{background:'rgba(239,68,68,.15)',color:'#EF4444'}}>⚠ {urgent} urgents</span>}
          <button className={`btn btn-sm ${view==='croquis'?'btn-acc':'btn-g'}`} onClick={()=>setView('croquis')}>🗺 Croquis</button>
          <button className={`btn btn-sm ${view==='stats'?'btn-acc':'btn-g'}`} onClick={()=>setView('stats')}>📊 Stats</button>
          <button className="btn btn-g btn-sm" onClick={()=>setShowExp(true)}>📤 Exportar</button>
        </div>
      </div>

      {view==='stats'?<StatsView project={project}/>:<>
        {/* Zone tabs */}
        <div className="zone-tabs">
          {project.zones.map(z=>(
            <div key={z.id} className={`ztab${az===z.id?' on':''}`} onClick={()=>setAz(z.id)}>
              {z.name}
              {z.lesions.filter(l=>l.urg==='U').length>0&&(
                <span style={{marginLeft:5,background:'#EF4444',color:'#fff',borderRadius:'50%',fontSize:8,fontWeight:800,display:'inline-block',width:13,height:13,lineHeight:'13px',textAlign:'center'}}>
                  {z.lesions.filter(l=>l.urg==='U').length}
                </span>
              )}
            </div>
          ))}
          <div className="ztab-add" onClick={()=>setShowNZ(true)}>＋</div>
        </div>
        {/* Zone content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {zone?<ZoneView key={zone.id} zone={zone} onUpdate={upZone}/>:(
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--t3)'}}>
              <span style={{fontSize:48}}>🗺</span>
              <div style={{fontSize:15,fontWeight:600,color:'var(--t2)'}}>Cap zona creada</div>
              <button className="btn btn-acc" onClick={()=>setShowNZ(true)}>+ Afegir primera zona</button>
            </div>
          )}
        </div>
      </>}

      {showNZ&&<NewZoneM onSave={addZone} onClose={()=>setShowNZ(false)}/>}
      {showExp&&<ExportM project={project} onClose={()=>setShowExp(false)}/>}
    </div>
  );
};

/* ── Dashboard ──────────────────────────────────────────────────── */
const Dashboard=({projects,onOpen,onCreate})=>(
  <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={{padding:'18px 24px',background:'var(--s1)',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',maxWidth:1100,margin:'0 auto',width:'100%'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
            <div style={{width:30,height:30,background:'var(--acc)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:'#000',fontFamily:'Syne'}}>I</div>
            <h1 style={{letterSpacing:'-.01em'}}>InspecApp</h1>
            <span className="tag" style={{background:'var(--accd)',color:'var(--acc)'}}>BETA</span>
          </div>
          <p style={{fontSize:13,color:'var(--t2)'}}>Gestió d'inspeccions d'edificis · Nomenclatura, croquis i exportació integrats</p>
        </div>
        <button className="btn btn-acc" style={{fontSize:14,padding:'9px 18px'}} onClick={onCreate}>+ Nou projecte</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'24px',maxWidth:1100,margin:'0 auto',width:'100%'}}>
      {projects.length===0?(
        <div style={{maxWidth:400,margin:'80px auto',textAlign:'center'}}>
          <div style={{fontSize:60,marginBottom:14}}>🏢</div>
          <h2 style={{fontFamily:'Syne',fontSize:20,marginBottom:8}}>Comença la primera inspecció</h2>
          <p style={{color:'var(--t2)',marginBottom:22,fontSize:14}}>Crea un projecte per a cada edifici. Afegeix zones, croquis, marca les lesions i exporta l'informe.</p>
          <button className="btn btn-acc" style={{fontSize:14,padding:'10px 22px'}} onClick={onCreate}>Crear primer projecte</button>
        </div>
      ):(
        <>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--t3)',marginBottom:14}}>Projectes recents ({projects.length})</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:14}}>
            {projects.map(p=>{
              const all=p.zones.flatMap(z=>z.lesions);
              const urg=all.filter(l=>l.urg==='U').length;
              return(
                <div key={p.id} className="proj-card fi" onClick={()=>onOpen(p.id)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <h2 style={{fontFamily:'Syne',fontSize:14,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</h2>
                      <div style={{fontSize:11,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.edifici}</div>
                    </div>
                    <span className="mono" style={{fontSize:10,color:'var(--t3)',marginLeft:8,flexShrink:0}}>{p.codiObra}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7,marginBottom:12}}>
                    {[{n:p.zones.length,l:'Zones'},{n:all.length,l:'Lesions'},{n:urg,l:'Urgents',c:'#EF4444'}].map((s,i)=>(
                      <div key={i} style={{background:'var(--s2)',borderRadius:4,padding:'6px 7px',textAlign:'center'}}>
                        <div style={{fontSize:18,fontWeight:700,fontFamily:'IBM Plex Mono',color:s.c||'var(--acc)'}}>{s.n}</div>
                        <div style={{fontSize:9,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.06em'}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,color:'var(--t3)'}}>
                    <span>📅 {p.data}</span><span>👤 {p.inspector}</span>
                  </div>
                  {urg>0&&<div style={{marginTop:9,padding:'5px 9px',background:'rgba(239,68,68,.08)',borderRadius:4,border:'1px solid rgba(239,68,68,.18)',fontSize:11,color:'#EF4444',fontWeight:600}}>
                    ⚠ {urg} lesions urgents
                  </div>}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  </div>
);

/* ── App Root ───────────────────────────────────────────────────── */
const App=()=>{
  const [projects,setProjects]=useState([DEMO]);
  const [openId,setOpenId]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const curr=projects.find(p=>p.id===openId);
  const upProj=(p)=>setProjects(prev=>prev.map(x=>x.id===p.id?p:x));
  const addProj=(p)=>{setProjects(prev=>[...prev,p]);setShowNew(false);setOpenId(p.id);};

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {openId&&curr
        ?<ProjView project={curr} onUpdate={upProj} onBack={()=>setOpenId(null)}/>
        :<Dashboard projects={projects} onOpen={setOpenId} onCreate={()=>setShowNew(true)}/>}
      {showNew&&<NewProjM onSave={addProj} onClose={()=>setShowNew(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
